<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramen Finder Tokyo 🍜 — Find your perfect ramen</title>
<meta name="description" content="AI-powered ramen shop recommender for tourists in Tokyo. Find the best bowl near you based on your taste and vibe."/>
<meta property="og:title" content="Ramen Finder Tokyo 🍜"/>
<meta property="og:description" content="Find your perfect ramen in Tokyo — AI personalized recommendations in EN / 中文 / 한국어 / 日本語"/>
<meta property="og:type" content="website"/>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #BA7517;
    --radius: 12px;
    --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --mono: "SF Mono", "Fira Code", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --bg2: #252522;
      --bg3: #2e2e2a;
      --text: #e8e6de;
      --text2: #9c9a92;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --green-light: #04342C;
      --green-mid: #085041;
      --blue-light: #042C53;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
  body{max-width:640px;margin:0 auto;padding:1.5rem 1rem 4rem}

  /* Header */
  .site-header{text-align:center;padding:2rem 0 1.5rem}
  .site-logo{font-size:36px;margin-bottom:.5rem}
  .site-name{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .site-tagline{font-size:14px;color:var(--text2);margin-top:.25rem}

  /* Lang bar */
  .lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:2rem}
  .lb{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
  .lb.on{background:var(--green);color:#fff;border-color:var(--green)}

  /* Steps */
  .step{display:none}.step.active{display:block}
  .prog{display:flex;align-items:center;margin:0 0 1.75rem}
  .pdot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);transition:all .3s;flex-shrink:0}
  .pdot.done{background:var(--green);border-color:var(--green);color:#fff}
  .pdot.cur{border-color:var(--green);color:var(--green)}
  .pline{flex:1;height:2px;background:var(--border);transition:background .3s}
  .pline.done{background:var(--green)}
  .ql{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
  .qt{font-size:22px;font-weight:600;color:var(--text);margin-bottom:.35rem;letter-spacing:-.01em}
  .qs{font-size:15px;color:var(--text2);line-height:1.55;margin-bottom:1.5rem}

  /* Option grids */
  .og{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:1.5rem}
  .oc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem .75rem;cursor:pointer;text-align:center;transition:all .18s;position:relative}
  .oc:hover{border-color:var(--green);background:var(--green-light)}
  .oc.sel{border:2px solid var(--green);background:var(--green-light)}
  .oc.sel::after{content:'✓';position:absolute;top:7px;right:9px;font-size:11px;color:var(--green);font-weight:600}
  .oi{font-size:26px;margin-bottom:5px;display:block}
  .ol{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:2px}
  .oc.sel .ol{color:var(--green-dark)}
  .os{font-size:11px;color:var(--text2);line-height:1.35;display:block}
  .oc.sel .os{color:var(--green)}

  /* Buttons */
  .nav{display:flex;gap:8px;align-items:center}
  .bn{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px 24px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;font-family:var(--font)}
  .bn:hover{background:var(--green-dark)}
  .bn:disabled{background:var(--bg3);color:var(--text3);cursor:default;border:1px solid var(--border)}
  .bb{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 18px;font-size:15px;color:var(--text2);cursor:pointer;font-family:var(--font)}
  .bb:hover{background:var(--bg2)}

  /* Location & API cards */
  .info-card{background:var(--bg2);border-radius:var(--radius);padding:1.1rem;margin-bottom:.85rem;border:1px solid var(--border)}
  .info-card .label{font-size:13px;color:var(--text2);margin-bottom:6px}
  .info-card .coords{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:3px}
  .loc-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
  .bl{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500}
  .bl:hover{background:#0C447C}
  .bsk{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font)}
  .bsk:hover{background:var(--bg)}
  .api-row{display:flex;gap:8px;margin-top:8px}
  .api-in{flex:1;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font)}
  .api-in:focus{outline:none;border-color:var(--green)}
  .api-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap}
  .api-btn:hover{background:#0C447C}
  .api-note{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}

  /* Result cards */
  .rh2{font-size:22px;font-weight:600;color:var(--text);margin-bottom:.3rem;letter-spacing:-.01em}
  .rs{font-size:14px;color:var(--text2);margin-bottom:1.1rem}
  .rc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.15rem;margin-bottom:12px;transition:border-color .15s}
  .rc:hover{border-color:var(--border2)}
  .rc.top{border:2px solid var(--green)}
  .top-b{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--green-light);color:var(--green-dark);padding:3px 10px;border-radius:20px;margin-bottom:8px}
  .num-b{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
  .rc-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
  .rc-nm{font-size:17px;font-weight:600;color:var(--text)}
  .rc-dist{font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .rc-tp{font-size:13px;color:var(--text2);margin-bottom:6px}
  .rc-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .stars{font-size:13px;color:var(--amber)}
  .rc-rv{font-size:13px;color:var(--text2)}
  .rc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
  .tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
  .rc-hr{font-size:12px;color:var(--text3);margin-bottom:9px}
  .ai-box{background:var(--green-light);border-left:3px solid var(--green);padding:.85rem 1rem;margin-top:6px}
  .ai-lbl{font-size:10px;font-weight:600;color:var(--green-dark);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
  .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pu 1.2s ease-in-out infinite;flex-shrink:0}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
  .ai-txt{font-size:13px;color:var(--green-dark);line-height:1.65}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--green-mid);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .map-row{display:flex;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .map-a{font-size:13px;color:var(--blue);text-decoration:none;font-weight:500}
  .map-a:hover{text-decoration:underline}

  /* Fact strip */
  .fact{display:flex;gap:12px;align-items:flex-start;background:var(--bg2);border-radius:var(--radius);padding:1.1rem;margin-top:1.25rem;border:1px solid var(--border)}
  .fact-ico{font-size:20px;flex-shrink:0;margin-top:1px}
  .fact-lbl{font-size:10px;font-weight:600;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
  .fact-txt{font-size:13px;color:var(--text);line-height:1.6}
  .br{margin-top:1.25rem}
  .br button{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font)}
  .br button:hover{background:var(--bg2)}

  /* Footer */
  .footer{text-align:center;margin-top:3rem;font-size:12px;color:var(--text3)}
  .footer a{color:var(--text3)}

  /* Hero step */
  .hero{text-align:center;padding:1rem 0 1.5rem}
  .hero-icon{font-size:44px;margin-bottom:.6rem}
  .hero-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:.5rem;letter-spacing:-.02em}
  .hero-sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:440px;margin:0 auto}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">🍜</div>
  <div class="site-name">Ramen Finder Tokyo</div>
  <div class="site-tagline">AI-powered ramen recommendations for travelers</div>
</header>

<div class="lang-bar">
  <button class="lb on" onclick="setL('en')">EN</button>
  <button class="lb" onclick="setL('zh')">中文</button>
  <button class="lb" onclick="setL('ko')">한국어</button>
  <button class="lb" onclick="setL('ja')">日本語</button>
</div>

<!-- Step 1: Location + API -->
<div class="step active" id="s1">
  <div class="hero">
    <div class="hero-icon">📍</div>
    <div class="hero-title" id="ht"></div>
    <div class="hero-sub" id="hs"></div>
  </div>
  <div class="info-card">
    <div class="label" id="lst"></div>
    <div class="coords" id="lco"></div>
    <div class="loc-row">
      <button class="bl" onclick="getGPS()" id="bgps"></button>
      <button class="bsk" onclick="useDef()" id="bsk"></button>
    </div>
  </div>
  <div class="info-card">
    <div class="label" id="albl"></div>
    <div class="api-row">
      <input class="api-in" id="akey" type="password" placeholder="AIza..."/>
      <button class="api-btn" onclick="saveKey()" id="asave"></button>
    </div>
    <div class="api-note" id="anote"></div>
  </div>
  <div class="nav"><button class="bn" id="n1" disabled onclick="goS(2)"></button></div>
</div>

<!-- Step 2: Broth -->
<div class="step" id="s2">
  <div class="prog" id="p2"></div>
  <div class="ql" id="q1l"></div>
  <div class="qt" id="q1t"></div>
  <div class="qs" id="q1s"></div>
  <div class="og" id="fg"></div>
  <div class="nav">
    <button class="bb" onclick="goS(1)" id="b1"></button>
    <button class="bn" id="n2" disabled onclick="goS(3)"></button>
  </div>
</div>

<!-- Step 3: Noodles -->
<div class="step" id="s3">
  <div class="prog" id="p3"></div>
  <div class="ql" id="q2l"></div>
  <div class="qt" id="q2t"></div>
  <div class="qs" id="q2s"></div>
  <div class="og" id="ng"></div>
  <div class="nav">
    <button class="bb" onclick="goS(2)" id="b2"></button>
    <button class="bn" id="n3" disabled onclick="goS(4)"></button>
  </div>
</div>

<!-- Step 4: Vibe -->
<div class="step" id="s4">
  <div class="prog" id="p4"></div>
  <div class="ql" id="q3l"></div>
  <div class="qt" id="q3t"></div>
  <div class="qs" id="q3s"></div>
  <div class="og" id="vg"></div>
  <div class="nav">
    <button class="bb" onclick="goS(3)" id="b3"></button>
    <button class="bn" id="n4" disabled onclick="findR()"></button>
  </div>
</div>

<!-- Step 5: Results -->
<div class="step" id="s5">
  <div class="rh2" id="rttl"></div>
  <div class="rs" id="rsub"></div>
  <div id="rl"></div>
  <div class="fact">
    <div class="fact-ico">💡</div>
    <div>
      <div class="fact-lbl" id="flab"></div>
      <div class="fact-txt" id="ftxt"></div>
    </div>
  </div>
  <div class="br"><button onclick="restart()" id="brst"></button></div>
</div>

<footer class="footer">
  <p>Made with ❤️ for ramen lovers worldwide &nbsp;·&nbsp; <a href="https://github.com">View on GitHub</a></p>
</footer>

<script>
const ST={lang:'en',lat:null,lng:null,flavor:null,noodle:null,vibe:null,mapsKey:null};

function c(){return L[ST.lang]}
function tx(k,...a){const v=c()[k];return typeof v==='function'?v(...a):v}

function setL(l){
  ST.lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()==={en:'EN',zh:'中文',ko:'한국어',ja:'日本語'}[l]));
  render();buildGrids();
}

function render(){
  const cv=c();
  const m={ht:'ht',hs:'hs',lst:'lst',albl:'albl',asave:'asave',anote:'anote',bgps:'bgps',bsk:'bsk',q1l:'q1l',q1t:'q1t',q1s:'q1s',q2l:'q2l',q2t:'q2t',q2s:'q2s',q3l:'q3l',q3t:'q3t',q3s:'q3s',flab:'flab',brst:'brst'};
  Object.entries(m).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.textContent=cv[k]});
  ['b1','b2','b3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=cv.back});
  ['n1','n2','n3'].forEach(id=>{const el=document.getElementById(id);if(el&&!el.disabled)el.textContent=cv.next});
  const n4=document.getElementById('n4');if(n4&&!n4.disabled)n4.textContent=cv.find;
}

function buildProg(cid,cur){
  const el=document.getElementById(cid);if(!el)return;
  const labs=c().plabels;let h='';
  labs.forEach((lab,i)=>{
    const done=i<cur,active=i===cur;
    h+=`<div class="pdot ${done?'done':active?'cur':''}">${done?'✓':i+1}</div>`;
    if(i<labs.length-1)h+=`<div class="pline ${done?'done':''}"></div>`;
  });
  el.innerHTML=h;
}

function buildGrids(){
  const cv=c();
  const make=(items,key,nid,gid)=>{
    const g=document.getElementById(gid);if(!g)return;
    g.innerHTML=items.map(it=>`<div class="oc${ST[key]===it.k?' sel':''}" onclick="pick(this,'${key}','${it.k}','${nid}')"><span class="oi">${it.i}</span><span class="ol">${it.l}</span><span class="os">${it.s}</span></div>`).join('');
  };
  make(FLAVORS[ST.lang],'flavor','n2','fg');
  make(cv.noodles,'noodle','n3','ng');
  make(cv.vibes,'vibe','n4','vg');
}

function pick(el,key,val,nid){
  el.closest('.og').querySelectorAll('.oc').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');ST[key]=val;
  const nb=document.getElementById(nid);
  if(nb){nb.disabled=false;nb.textContent=nid==='n4'?tx('find'):tx('next');}
}

function goS(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(n===2)buildProg('p2',0);
  if(n===3)buildProg('p3',1);
  if(n===4)buildProg('p4',2);
}

function getGPS(){
  document.getElementById('lst').textContent='Detecting...';
  if(!navigator.geolocation){useDef();return}
  navigator.geolocation.getCurrentPosition(pos=>{
    ST.lat=pos.coords.latitude;ST.lng=pos.coords.longitude;
    document.getElementById('lst').textContent=tx('ldet');
    document.getElementById('lco').textContent=ST.lat.toFixed(4)+'°N, '+ST.lng.toFixed(4)+'°E';
    const nb=document.getElementById('n1');nb.disabled=false;nb.textContent=tx('next');
  },()=>useDef());
}

function useDef(){
  ST.lat=35.6762;ST.lng=139.6503;
  document.getElementById('lst').textContent=tx('ldef');
  document.getElementById('lco').textContent='35.6762°N, 139.6503°E';
  const nb=document.getElementById('n1');nb.disabled=false;nb.textContent=tx('next');
}

function saveKey(){
  const k=document.getElementById('akey').value.trim();
  if(k){ST.mapsKey=k;document.getElementById('anote').textContent='✓ API key saved! Real-time search is now active.';}
}

function dr(a,b,d,e){const R=6371,x=(d-a)*Math.PI/180,y=(e-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(d*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}

async function findR(){
  if(ST.mapsKey){await findNearby();}else{findCurated();}
}

  try{
    const q=ST.flavor+' ramen Tokyo';
    const url=`https://maps.googleapis.com/maps/api/place/nearbysearch/json?location=${ST.lat},${ST.lng}&radius=2000&keyword=${encodeURIComponent(q)}&type=restaurant&key=${ST.mapsKey}`;
    const res=await fetch(url);const data=await res.json();
    if(data.status==='OK'&&data.results.length){
      const shops=data.results.slice(0,3).map(p=>({
        id:p.place_id,name:p.name,type:ST.flavor+' ramen',area:'Nearby',
        lat:p.geometry.location.lat,lng:p.geometry.location.lng,
        rating:p.rating||4.0,reviews:p.user_ratings_total||0,
        tags:p.opening_hours?.open_now?['Open now']:['Check hours'],
        flavors:[ST.flavor],vibes:['casual'],
        hours:p.opening_hours?.open_now?'Currently open':'Check Google Maps',
        mapUrl:`https://maps.google.com/?place_id=${p.place_id}`
      }));
      renderR(shops);
    }else{findCurated();}
  }catch(e){findCurated();}
}

function findCurated(){
  const fl=FLAVORS[ST.lang].find(f=>f.k===ST.flavor)||{l:ST.flavor};
  let shops=[...SHOPS];
  if(ST.vibe==='halal'){shops=shops.filter(s=>s.vibes.includes('halal'));}
  else{
    const fs=shops.filter(s=>s.flavors.includes(ST.flavor));
    if(fs.length)shops=fs;
    if(ST.vibe)shops=[...shops].sort((a,b)=>(b.vibes.includes(ST.vibe)?1:0)-(a.vibes.includes(ST.vibe)?1:0));
  }
  shops=shops.map(s=>({...s,_d:dr(ST.lat,ST.lng,s.lat,s.lng)})).sort((a,b)=>b.rating-a.rating+((a._d-b._d)*.05)).slice(0,3);
  document.getElementById('rttl').textContent=tx('rtitle',fl.l);
  document.getElementById('rsub').textContent=tx('rsub',shops.length);
  goS(5);renderR(shops);
}

function renderR(shops){
  const cv=c();
  const fl=FLAVORS[ST.lang].find(f=>f.k===ST.flavor)||{l:ST.flavor};
  const nl=cv.noodles.find(n=>n.k===ST.noodle)||{l:ST.noodle||''};
  const vl=cv.vibes.find(v=>v.k===ST.vibe)||{l:ST.vibe||''};
  document.getElementById('ftxt').textContent=cv.facts[ST.flavor]||cv.facts.shoyu;
  document.getElementById('flab').textContent=tx('flab');
  document.getElementById('brst').textContent=tx('brst');
  const list=document.getElementById('rl');list.innerHTML='';
  shops.forEach((s,i)=>{
    const d=s._d!==undefined?(s._d<1?Math.round(s._d*1000)+'m':s._d.toFixed(1)+'km'):'';
    const stars='★'.repeat(Math.round(s.rating))+'☆'.repeat(5-Math.round(s.rating));
    const isTop=i===0;const aid='ai-'+s.id;
    list.innerHTML+=`<div class="rc${isTop?' top':''}">
      ${isTop?`<div class="top-b">⭐ ${tx('topick')}</div>`:`<div class="num-b">${tx('pick',i+1)}</div>`}
      <div class="rc-hd"><span class="rc-nm">${s.name}</span>${d?`<span class="rc-dist">${d}</span>`:''}</div>
      <div class="rc-tp">${s.type} — ${s.area}</div>
      <div class="rc-meta"><span class="stars">${stars}</span><span class="rc-rv">${s.rating.toFixed(1)} (${s.reviews.toLocaleString()})</span></div>
      <div class="rc-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="rc-hr">${tx('hours')}: ${s.hours}</div>
      <div class="ai-box">
        <div class="ai-lbl"><div class="ai-dot"></div>${tx('ailbl')}</div>
        <div class="ai-txt" id="${aid}"><span class="spin"></span> <span style="font-size:13px;color:var(--green)">${tx('aload')}</span></div>
      </div>
      <div class="map-row"><a class="map-a" href="${s.mapUrl}" target="_blank" rel="noopener">${tx('maplink')}</a></div>
    </div>`;
    callAI(s,fl.l,nl.l,vl.l,aid);
  });
}

async function callAI(shop,f,n,v,tid){
  const el=document.getElementById(tid);if(!el)return;
  const prompt=c().aiprompt(shop,f,n,v);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    el.textContent=data.content?.map(b=>b.text||'').join('')||'—';
  }catch(e){el.textContent='—';}
}

function restart(){
  ST.flavor=null;ST.noodle=null;ST.vibe=null;
  document.querySelectorAll('.oc').forEach(c=>c.classList.remove('sel'));
  ['n2','n3','n4'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  goS(1);buildGrids();
}

render();buildGrids();
</script>
</body>
</html>
