<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramen Finder Tokyo 🍜</title>
<meta name="description" content="Find your perfect ramen in Tokyo — personalized recommendations in EN / 中文 / 한국어 / 日本語"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
:root{
  --bg:#FDFAF5;--bg2:#F3EFE6;--bg3:#E8E2D5;
  --text:#1C1917;--text2:#6B6560;--text3:#A09890;
  --border:rgba(28,25,23,0.1);--border2:rgba(28,25,23,0.22);
  --ink:#1C1917;--red:#C0392B;
  --gold:#A07010;--gold-light:#FEF7E0;--gold-border:rgba(160,112,16,0.25);
  --green:#1A6B4A;--green-light:#E6F4EE;--green-border:rgba(26,107,74,0.25);
  --blue:#1A4A7A;--blue-light:#E8F0FA;--blue-border:rgba(26,74,122,0.25);
  --font-display:'Playfair Display',Georgia,serif;
  --font:'DM Sans',-apple-system,sans-serif;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.05);
  --shadow-md:0 2px 8px rgba(0,0,0,0.07),0 8px 24px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#18170F;--bg2:#211F15;--bg3:#2A271A;
    --text:#EDE8DC;--text2:#9B9585;--text3:#6B6555;
    --border:rgba(237,232,220,0.08);--border2:rgba(237,232,220,0.18);
    --gold-light:#241C08;--gold-border:rgba(160,112,16,0.3);
    --green-light:#0D2018;--green-border:rgba(26,107,74,0.3);
    --blue-light:#0D1A28;--blue-border:rgba(26,74,122,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{max-width:580px;margin:0 auto;padding:0 1rem 5rem}
.header{padding:2.5rem 0 0;text-align:center}
.header-eye{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;font-weight:500}
.header-title{font-family:var(--font-display);font-size:clamp(30px,7vw,42px);color:var(--text);line-height:1.08;margin-bottom:.3rem}
.header-title em{color:var(--red);font-style:normal}
.header-rule{width:36px;height:2px;background:var(--red);margin:.85rem auto 0}
.lang-bar{display:flex;gap:4px;justify-content:center;margin:1.4rem 0 1.75rem}
.lb{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}
.lb:hover{background:var(--bg2)}
.lb.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.area-label-txt{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;font-weight:500}
.area-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.area-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}
.area-btn:hover{background:var(--bg2)}
.area-btn.on{background:var(--red);color:#fff;border-color:var(--red)}
.area-btn.soon{opacity:.4;cursor:default}
.step{display:none}.step.active{display:block}
.prog{display:flex;align-items:center;margin:0 0 2rem}
.pdot{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text3);transition:all .3s;flex-shrink:0}
.pdot.done{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.pdot.cur{border-color:var(--ink);color:var(--ink)}
.pline{flex:1;height:1px;background:var(--border2)}
.pline.done{background:var(--ink)}
.ql{font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem;font-weight:500}
.qt{font-family:var(--font-display);font-size:22px;color:var(--text);margin-bottom:.35rem;line-height:1.2}
.qs{font-size:14px;color:var(--text2);line-height:1.55;margin-bottom:1.4rem}
.og{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:8px;margin-bottom:1.4rem}
.oc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem .7rem;cursor:pointer;text-align:center;transition:all .18s;position:relative;box-shadow:var(--shadow)}
.oc:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.oc.sel{border:1.5px solid var(--ink);background:var(--bg2)}
.oc.sel::after{content:'✓';position:absolute;top:7px;right:8px;font-size:10px;color:var(--ink);font-weight:700}
.oi{font-size:24px;margin-bottom:5px;display:block}
.ol{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:2px;line-height:1.3}
.os{font-size:11px;color:var(--text2);line-height:1.35;display:block}
.nav{display:flex;gap:8px;align-items:center;margin-top:.5rem}
.bn{background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius);padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.bn:hover{opacity:.82}
.bn:disabled{background:var(--bg3);color:var(--text3);cursor:default}
.bb{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:11px 18px;font-size:14px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.bb:hover{background:var(--bg2)}
.intro-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;margin-bottom:1rem}
.intro-card p{font-size:14px;color:var(--text2);line-height:1.65}
.loc-card{background:var(--bg2);border-radius:var(--radius);padding:1.1rem;margin-bottom:.85rem;border:1px solid var(--border)}
.loc-label{font-size:13px;color:var(--text2);font-weight:500}
.loc-coords{font-size:11px;color:var(--text3);font-family:monospace;margin-top:3px}
.loc-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
.bl{background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:9px 16px;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500}
.bl:hover{opacity:.88}
.bsk{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.bsk:hover{background:var(--bg)}
.res-head{margin-bottom:1.25rem}
.res-title{font-family:var(--font-display);font-size:22px;color:var(--text);margin-bottom:.3rem}
.res-sub{font-size:13px;color:var(--text2)}
.rc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.15rem;margin-bottom:10px;box-shadow:var(--shadow);transition:box-shadow .18s}
.rc:hover{box-shadow:var(--shadow-md)}
.rc.top{border-color:var(--ink);border-width:1.5px}
.top-b{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:var(--ink);color:var(--bg);padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase}
.num-b{font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.rc-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
.rc-nm{font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
.rc-dist{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);border:1px solid var(--blue-border);padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.rc-type{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500}
.rc-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.stars{font-size:12px;color:var(--gold)}
.rc-rv{font-size:12px;color:var(--text2)}
.rc-price{font-size:12px;color:var(--text3);padding:1px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg2)}
.rc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-weight:500}
.tag.halal{background:var(--green-light);color:var(--green);border-color:var(--green-border)}
.tag.open24{background:var(--gold-light);color:var(--gold);border-color:var(--gold-border)}
.tag.english{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.tag.gold{background:var(--gold-light);color:var(--gold);border-color:var(--gold-border)}
.rc-hr{font-size:11px;color:var(--text3);margin-bottom:9px}
.comment-box{background:var(--bg2);border-radius:8px;padding:.8rem .95rem;margin-top:6px;border-left:2px solid var(--border2)}
.comment-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.comment-txt{font-size:13px;color:var(--text2);line-height:1.65;font-style:italic}
.map-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.map-a{font-size:13px;color:var(--blue);text-decoration:none;font-weight:600}
.map-a:hover{text-decoration:underline}
.fact{display:flex;gap:12px;align-items:flex-start;background:var(--gold-light);border-radius:var(--radius);padding:1.1rem;margin-top:1.25rem;border:1px solid var(--gold-border)}
.fact-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.fact-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.fact-txt{font-size:13px;color:var(--text);line-height:1.6}
.br{margin-top:1.25rem}
.br button{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.br button:hover{background:var(--bg2)}
.footer{text-align:center;padding:2.5rem 0 1rem;font-size:12px;color:var(--text3)}
</style>
</head>

<header class="header">

  <div class="res-head">
    <div class="res-title" id="rttl"></div>
    <div class="res-sub" id="rsub"></div>
  </div>
  <div id="rl"></div>
  <div class="fact">

</div>
<footer class="footer">Ramen Finder Tokyo · Made for travelers 🍜</footer>

    facts:{shoyu:'쇼유 라멘은 1910년 아사쿠사에서 탄생했습니다.',miso:'미소 라멘은 1950년대 삿포로에서 우연히 발명되었습니다.',tonkotsu:'돈코츠 육수는 12~18시간 끓여 콜라겐을 유화시킨 육수입니다.',shio:'시오는 가장 오래된 라멘 스타일입니다.',toripaitan:'토리 파이탄은 닭을 강하게 오래 끓여 유백색으로 만든 육수입니다.',gyokai:'교카이는 말린 생선·조개·다시마를 겹겹이 쌓아 만든 복합 수프입니다.'},
    plabels:['육수','면','분위기']},
  ja:{hs:'あなたの好みや雰囲気を教えてください — 選択したエリアの最高のラーメン店をご案内します。',lst:'位置情報を共有して近くのお店を探しましょう。',ldet:'位置情報を取得しました！',ldef:'新宿（東京）をデフォルトとして使用します。',lfail:'新宿（デフォルト）を使用します。',bgps:'📍 現在地を使用',bsk:'新宿（デフォルト）',areaLabel:'エリアを選択',areaSoon:'近日公開',q1l:'ステップ 1/3 — スープ',q1t:'どんなスープが好きですか？',q1s:'スープはラーメンの魂です。最も惹かれるものを選んでください。',q2l:'ステップ 2/3 — 麺',q2t:'麺はどんなのが好きですか？',q2s:'食感で体験が大きく変わります。',q3l:'ステップ 3/3 — 雰囲気',q3t:'今日の気分は？',q3s:'あなたのムードに合った雰囲気を選んでください。',flab:'ラーメン豆知識',brst:'← やり直す',find:'ラーメンを探す →',next:'次へ →',back:'← 戻る',rtitle:(f,a)=>f+'ラーメン — '+a+'のおすすめ',rsub:n=>n+'店舗がマッチしました。',topick:'TOP PICK',pick:n=>'MATCH #'+n,clbl:'このお店について',maplink:'Google Mapsで開く →',hours:'営業時間',
    noodles:[{k:'thin',i:'〰️',l:'細ストレート',s:'あっさりスープに最適'},{k:'wavy',i:'🌀',l:'縮れ麺',s:'濃いスープをよく絡む'},{k:'flat',i:'📄',l:'平打ち麺',s:'素朴で旨みをよく吸収'},{k:'any',i:'✨',l:'おまかせ！',s:'シェフのおすすめ'}],
    vibes:[{k:'local',i:'🏮',l:'ローカル & 本格派',s:'隠れた名店、本物の味'},{k:'trendy',i:'📸',l:'トレンディ',s:'スタイリッシュ、映え'},{k:'casual',i:'🪑',l:'カジュアル',s:'英語メニューあり、気軽に'},{k:'solo',i:'🍜',l:'一人カウンター',s:'個室ブース、ラーメン三昧'},{k:'halal',i:'🌙',l:'ハラール対応',s:'ハラール認証オプションあり'}],
    facts:{shoyu:'醤油ラーメンは1910年に浅草で生まれました。鶏ガラや出汁をベースに使用し、他のスタイルよりあっさりしています。',miso:'味噌ラーメンは1950年代に札幌でほぼ偶然に生まれ、北海道の名物になりました。',tonkotsu:'豚骨スープは12〜18時間ぐつぐつ煮続けてコラーゲンを乳化させたクリーミーな白濁スープです。',shio:'塩ラーメンは最も古いスタイルで、塩だけで味を整えるためスープそのものの品質がすべてです。',toripaitan:'鶏白湯は鶏を強火で長時間煮込み、乳白色に仕上げたもの。柚子やトリュフとの相性が抜群です。',gyokai:'魚介系は煮干し・あさり・昆布などを重ね合わせた複雑なうまみが特徴です。'},
    plabels:['スープ','麺','雰囲気']}
};
function c(){return L[ST.lang]}
function tx(k,...a){const v=c()[k];return typeof v==='function'?v(...a):v}
function setL(l){ST.lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()==={en:'EN',zh:'中文',ko:'한국어',ja:'日本語'}[l]));render();buildGrids();buildAreaBar()}
function render(){
  const cv=c();
  const m={hs:'hs',lst:'lst',bgps:'bgps',bsk:'bsk',q1l:'q1l',q1t:'q1t',q1s:'q1s',q2l:'q2l',q2t:'q2t',q2s:'q2s',q3l:'q3l',q3t:'q3t',q3s:'q3s',flab:'flab',brst:'brst'};
  Object.entries(m).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.textContent=cv[k]});
  document.getElementById('area-label').textContent=tx('areaLabel');
  ['b1','b2','b3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=cv.back});
  ['n1','n2','n3'].forEach(id=>{const el=document.getElementById(id);if(el&&!el.disabled)el.textContent=cv.next});
  const n4=document.getElementById('n4');if(n4&&!n4.disabled)n4.textContent=cv.find;
}
function buildAreaBar(){
  const bar=document.getElementById('area-bar');
  bar.innerHTML=AREAS.map(a=>{
    const name=a.name[ST.lang]||a.name.en;
    const soonTxt=!a.available?` (${tx('areaSoon')})`:'';
    return `<button class="area-btn${a.id===ST.area?' on':''}${!a.available?' soon':''}" onclick="${a.available?`selectArea('${a.id}')`:'void(0)'}">${name}${soonTxt}</button>`;
  }).join('');
}
function selectArea(id){ST.area=id;buildAreaBar();loadArea(id)}
async function loadArea(id){
  const area=AREAS.find(a=>a.id===id);if(!area)return;
  try{const res=await fetch(area.file);const data=await res.json();ST.shopsData=data.shops||[];}
  catch(e){console.warn('load failed',e);ST.shopsData=[];}
}
function buildProg(cid,cur){
  const el=document.getElementById(cid);if(!el)return;
  const labs=c().plabels;let h='';
  labs.forEach((lab,i)=>{
    const done=i<cur,active=i===cur;
    h+=`<div class="pdot ${done?'done':active?'cur':''}">${done?'✓':i+1}</div>`;
    if(i<labs.length-1)h+=`<div class="pline ${i<cur?'done':''}"></div>`;
  });
  el.innerHTML=h;
}
function buildGrids(){
  const cv=c();
  const make=(items,key,nid,gid)=>{const g=document.getElementById(gid);if(!g)return;g.innerHTML=items.map(it=>`<div class="oc${ST[key]===it.k?' sel':''}" onclick="pick(this,'${key}','${it.k}','${nid}')"><span class="oi">${it.i}</span><span class="ol">${it.l}</span><span class="os">${it.s}</span></div>`).join('')};
  make(FLAVORS[ST.lang],'flavor','n2','fg');make(cv.noodles,'noodle','n3','ng');make(cv.vibes,'vibe','n4','vg');
}
function pick(el,key,val,nid){
  el.closest('.og').querySelectorAll('.oc').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');ST[key]=val;
  const nb=document.getElementById(nid);if(nb){nb.disabled=false;nb.textContent=nid==='n4'?tx('find'):tx('next');}
}
function goS(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('s'+n).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});
  if(n===2)buildProg('p2',0);if(n===3)buildProg('p3',1);if(n===4)buildProg('p4',2);
}
function getGPS(){
  document.getElementById('lst').textContent='Detecting...';
  if(!navigator.geolocation){useDef();return}
  navigator.geolocation.getCurrentPosition(pos=>{
    ST.lat=pos.coords.latitude;ST.lng=pos.coords.longitude;
    document.getElementById('lst').textContent=tx('ldet');
    document.getElementById('lco').textContent=ST.lat.toFixed(4)+'°N, '+ST.lng.toFixed(4)+'°E';
    const nb=document.getElementById('n1');nb.disabled=false;nb.textContent=tx('next');
  },()=>useDef());
}
function useDef(){
  const a=AREAS.find(x=>x.id===ST.area)||AREAS[0];
  ST.lat=a.lat;ST.lng=a.lng;
  document.getElementById('lst').textContent=tx('ldef');
  document.getElementById('lco').textContent=ST.lat.toFixed(4)+'°N, '+ST.lng.toFixed(4)+'°E';
  const nb=document.getElementById('n1');nb.disabled=false;nb.textContent=tx('next');
}
function dr(a,b,d,e){const R=6371,x=(d-a)*Math.PI/180,y=(e-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(d*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function findR(){
  const cv=c();const fl=FLAVORS[ST.lang].find(f=>f.k===ST.flavor)||{l:ST.flavor};
  const areaObj=AREAS.find(a=>a.id===ST.area)||AREAS[0];const areaName=areaObj.name[ST.lang]||areaObj.name.en;
  let shops=[...ST.shopsData];
  if(ST.vibe==='halal'){shops=shops.filter(s=>s.vibes.includes('halal'));}
  else{const fs=shops.filter(s=>s.flavors.includes(ST.flavor));if(fs.length)shops=fs;if(ST.vibe)shops=[...shops].sort((a,b)=>(b.vibes.includes(ST.vibe)?1:0)-(a.vibes.includes(ST.vibe)?1:0));}
  shops=shops.map(s=>({...s,_d:dr(ST.lat,ST.lng,s.lat,s.lng)})).sort((a,b)=>(b.rating+1/(1+b._d*2))-(a.rating+1/(1+a._d*2))).slice(0,3);
  document.getElementById('rttl').textContent=tx('rtitle',fl.l,areaName);
  document.getElementById('rsub').textContent=tx('rsub',shops.length);
  document.getElementById('ftxt').textContent=cv.facts[ST.flavor]||cv.facts.shoyu;
  document.getElementById('flab').textContent=tx('flab');
  document.getElementById('brst').textContent=tx('brst');
  const list=document.getElementById('rl');list.innerHTML='';
  if(!shops.length){list.innerHTML='<div style="text-align:center;padding:2rem 0;color:var(--text3);font-size:14px">No shops found. Try a different broth or vibe.</div>';goS(5);return;}
  shops.forEach((s,i)=>{
    const dm=s._d<1?Math.round(s._d*1000)+'m':s._d.toFixed(1)+'km';
    const stars='★'.repeat(Math.round(s.rating))+'☆'.repeat(5-Math.round(s.rating));
    const isTop=i===0;
    const shopName=ST.lang==='ja'&&s.name_ja?s.name_ja:s.name;
    const areaLbl=s.area_label?s.area_label[ST.lang]||s.area_label.en:'';
    const hoursStr=s.hours?s.hours[ST.lang]||s.hours.en||s.hours:'';
    const commentTxt=s.comment?s.comment[ST.lang]||s.comment.en:'';
    const tagsHtml=s.tags.map(t=>{const label=typeof t.l==='object'?t.l[ST.lang]||t.l.en:t.l;return`<span class="tag ${t.cls||''}">${label}</span>`;}).join('');
    list.innerHTML+=`<div class="rc${isTop?' top':''}">
      ${isTop?`<div class="top-b">⭐ ${tx('topick')}</div>`:`<div class="num-b">${tx('pick',i+1)}</div>`}
      <div class="rc-hd"><span class="rc-nm">${shopName}</span><span class="rc-dist">${dm}</span></div>
      <div class="rc-type">${s.type}${areaLbl?' — '+areaLbl:''}</div>
      <div class="rc-meta"><span class="stars">${stars}</span><span class="rc-rv">${s.rating.toFixed(1)} (${s.reviews.toLocaleString()})</span>${s.price_range?`<span class="rc-price">${s.price_range}</span>`:''}</div>
      <div class="rc-tags">${tagsHtml}</div>
      <div class="rc-hr">${tx('hours')}: ${hoursStr}</div>
      ${commentTxt?`<div class="comment-box"><div class="comment-lbl">${tx('clbl')}</div><div class="comment-txt">${commentTxt}</div></div>`:''}
      <div class="map-row"><a class="map-a" href="${s.mapUrl}" target="_blank" rel="noopener">${tx('maplink')}</a></div>
    </div>`;
  });
  goS(5);
}
function restart(){
  ST.flavor=null;ST.noodle=null;ST.vibe=null;
  document.querySelectorAll('.oc').forEach(c=>c.classList.remove('sel'));
  ['n2','n3','n4'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=true;});
  goS(1);buildGrids();
}
render();buildGrids();buildAreaBar();loadArea(ST.area);
</script>
