name: Update shop data from Google Sheets

on:
  # 毎日午前3時（JST）に自動実行
  schedule:
    - cron: '0 18 * * *'

  # GitHubのActionsタブから手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run conversion script
        env:
          # GitHubのSecretsに登録したスプレッドシートIDとAPIキー
          SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/sheets_to_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 変更がある場合だけコミット（変更なしならスキップ）
          git diff --cached --quiet || git commit -m "Auto-update shop data from Google Sheets [$(date +'%Y-%m-%d')]"
          git push
